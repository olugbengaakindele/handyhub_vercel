{% extends "./base.html" %}

{% block body %}
<div class="min-h-screen bg-slate-100 py-10">
  <div class="max-w-lg mx-auto px-4">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-8">
      <h2 class="text-2xl font-extrabold text-slate-800 mb-3">Delete Achievement</h2>

      <p class="text-slate-600 mb-6">
        Are you sure you want to delete
        <span class="font-bold text-slate-800">{{ achievement.title }}</span>?
      </p>

      {% if achievement.issuer %}
        <p class="text-sm text-slate-500 mb-6">
          Issuer: {{ achievement.issuer }}
        </p>
      {% endif %}

      <form method="POST" class="flex items-center justify-end gap-3">
        {% csrf_token %}
        <a href="{% url 'users:edit_achievements' %}"
           class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-800 font-semibold hover:bg-slate-50 transition">
          Cancel
        </a>

        <button type="submit"
                class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-red-600 text-white font-semibold hover:bg-red-700 transition">
          Yes, Delete
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
