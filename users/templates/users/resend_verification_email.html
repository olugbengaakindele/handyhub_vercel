{% extends "./base.html" %}

{% block body %}
<div class="max-w-md mx-auto mt-12 bg-white p-6 rounded-xl shadow">
    <h1 class="text-2xl font-bold mb-4">Resend Verification Email</h1>

    <p class="text-gray-600 mb-4">
        Enter the email address you used to register. We will resend your verification email.
    </p>

    <form method="post">
        {% csrf_token %}

        <label class="block mb-2 font-medium">Email address</label>
        <input
            type="email"
            name="email"
            required
            class="w-full border rounded-lg px-3 py-2 mb-4"
            placeholder="you@example.com"
        >

        <button
            type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700"
        >
            Resend Verification Email
        </button>
    </form>
</div>
{% endblock %}
