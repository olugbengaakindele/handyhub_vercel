{% extends "users/base.html" %}
{% block body %}
<div class="max-w-xl mx-auto mt-16 bg-white p-8 rounded-2xl shadow">
  <h1 class="text-2xl font-bold text-gray-800">Set a new password</h1>

  <form method="post" class="mt-6 space-y-4">
    {% csrf_token %}
    <div>
        <label for="id_new_password1" class="block text-sm font-bold text-slate-700 mb-2">
          New Password
        </label>

        <input
          type="password"
          name="new_password1"
          id="id_new_password1"
          autocomplete="new-password"
          required
          class="w-full block rounded-2xl border-2 border-slate-400 bg-white px-4 py-3.5 text-slate-900 shadow-sm
                 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
        >

        {% if form.new_password1.errors %}
          <p class="mt-2 text-sm text-red-500">{{ form.new_password1.errors.0 }}</p>
        {% endif %}
      </div>

      <div>
        <label for="id_new_password2" class="block text-sm font-bold text-slate-700 mb-2">
          Confirm New Password
        </label>

        <input
          type="password"
          name="new_password2"
          id="id_new_password2"
          autocomplete="new-password"
          required
          class="w-full block rounded-2xl border-2 border-slate-400 bg-white px-4 py-3.5 text-slate-900 shadow-sm
                 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
        >

        {% if form.new_password2.errors %}
          <p class="mt-2 text-sm text-red-500">{{ form.new_password2.errors.0 }}</p>
        {% endif %}
      </div>

    <button class="w-full bg-teal-500 text-white py-3 rounded-xl hover:bg-teal-600">
      Reset Password
    </button>
  </form>
</div>
{% endblock %}
